  <main class="fondoContacto">

    <div class="container mt-5 pt-5">
      <h2>Contacto</h2>

      <form id="formulario">

        <input type="text" id="nombre" placeholder="Tu nombre"
          class="form-control mb-3" required>

        <input type="email" id="email" placeholder="Tu email"
          class="form-control mb-3" required>

        <textarea id="mensaje" placeholder="Tu mensaje"
          class="form-control mb-3" required></textarea>

        <button type="submit" class="btn btn-dark">Enviar</button>

      </form>

      <p id="respuesta" class="mt-3 text-success"></p>
    </div>

  </main>

  


  <!-- EMAILJS -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {

      emailjs.init("0Et4mYSPis0_WIRHf");

      const formulario = document.getElementById("formulario");

      formulario.addEventListener("submit", function (e) {

        e.preventDefault();

        let nombre = document.getElementById("nombre").value.trim();
        let email = document.getElementById("email").value.trim();
        let mensaje = document.getElementById("mensaje").value.trim();

        if (nombre === "" || email === "" || mensaje === "") {
          document.getElementById("respuesta").innerText = "Completá todos los campos ❌";
          return;
        }

        if (!email.includes("@")) {
          document.getElementById("respuesta").innerText = "Email inválido ❌";
          return;
        }

        emailjs.send("service_2eq3hqb", "template_mu1c5t8", {
          from_name: nombre,
          from_email: email,
          message: mensaje
        })
        .then(function () {
          document.getElementById("respuesta").innerText =
            "Mensaje enviado correctamente ✨";
          formulario.reset();
        })
        .catch(function (error) {
          console.log(error);
          document.getElementById("respuesta").innerText =
            "Error al enviar el mensaje ❌. Intentá de nuevo más tarde.";
        });

      });

    });
  </script>
